<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neno · Initiative Context</title>
<style>
  :root{
    --bg:#fbfbfd; --card:#ffffff; --ink:#1c1e26; --muted:#6b7280;
    --line:#e7e8ee; --accent:#5e6ad2; --green:#4cb782; --amber:#f2994a; --pink:#e8857a;
    --red:#d2553f; --shadow:0 1px 3px rgba(20,22,40,.06),0 8px 28px rgba(20,22,40,.06);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:920px;margin:0 auto;padding:24px 28px 64px;}
  .back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--accent);text-decoration:none;
    font-weight:600;margin-bottom:18px;}
  .back:hover{text-decoration:underline;}
  a{color:var(--accent);text-decoration:none;}

  .hero{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);
    padding:22px 24px;border-top:4px solid var(--accent);margin-bottom:22px;}
  .hero.amber{border-top-color:var(--amber);} .hero.pink{border-top-color:var(--pink);}
  h1{font-size:22px;margin:0 0 10px;letter-spacing:-.02em;line-height:1.25;}
  .meta{display:flex;flex-wrap:wrap;gap:8px 14px;font-size:12.5px;color:var(--muted);align-items:center;}
  .health{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;}
  .health.ontrack{background:#eafaf2;color:#268a5d;} .health.atrisk{background:#fdf0e6;color:#b56b27;}
  .health.offtrack{background:#fce9e6;color:var(--red);} .health.planning{background:#eef0fc;color:var(--accent);}
  .stamp{font-size:11.5px;color:var(--muted);margin-top:12px;}

  section{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
    padding:18px 22px;margin-bottom:16px;}
  .sec-h{font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 0 12px;}
  .exec{font-size:14.5px;line-height:1.6;color:#2c2f3a;}
  ul.clean{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:9px;}
  ul.clean li{font-size:13.5px;color:#3c404c;padding-left:16px;position:relative;line-height:1.45;}
  ul.clean li::before{content:"";position:absolute;left:0;top:8px;width:6px;height:6px;border-radius:50%;background:var(--accent);}
  ul.clean.changed li::before{background:var(--green);}
  ul.clean.q li::before{background:var(--amber);}
  ul.clean li .tag{font-size:11px;color:var(--muted);}
  ul.clean li .own{font-size:11px;color:var(--muted);font-weight:600;}

  .risk{display:flex;gap:10px;align-items:flex-start;font-size:13.5px;padding:9px 0;border-bottom:1px solid var(--line);}
  .risk:last-child{border-bottom:none;}
  .sev{font-size:10px;font-weight:800;text-transform:uppercase;padding:2px 8px;border-radius:6px;flex:none;margin-top:2px;}
  .sev.high{background:#fce9e6;color:var(--red);} .sev.med{background:#fdf0e6;color:#b56b27;} .sev.low{background:#eef0f4;color:#6b7280;}

  .proj{border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:10px;}
  .proj:last-child{margin-bottom:0;}
  .proj .ph{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-bottom:5px;}
  .proj .pn{font-size:14px;font-weight:650;}
  .pstat{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:#eef0f4;color:#50545f;}
  .pstat.inprogress{background:#eafaf2;color:#268a5d;}
  .proj .psum{font-size:12.5px;color:#5b5f6c;margin:2px 0 0;}
  .proj .pblock{font-size:12px;color:var(--red);margin-top:6px;}

  .meeting{border-left:3px solid var(--accent);padding:4px 0 4px 14px;margin-bottom:16px;}
  .meeting:last-child{margin-bottom:0;}
  .meeting .mh{font-size:14px;font-weight:650;}
  .meeting .md{font-size:11.5px;color:var(--muted);margin-bottom:6px;}
  .meeting .msum{font-size:13px;color:#3c404c;margin-bottom:8px;}
  .mblock{margin:6px 0;}
  .mblock .lbl{font-size:10.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
  .mblock ul{margin:3px 0 0;padding-left:18px;font-size:12.5px;color:#3c404c;}
  .mblock ul li{margin:2px 0;}

  .res{display:flex;flex-wrap:wrap;gap:8px;}
  .res a{font-size:12.5px;background:#eef0f4;border-radius:8px;padding:7px 12px;font-weight:600;}
  .src-note{font-size:11.5px;color:var(--muted);font-style:italic;margin-top:12px;}
  .empty{font-size:13px;color:#aeb2bd;font-style:italic;}
  .loading,.err{padding:50px 0;text-align:center;color:var(--muted);}
  .err{color:var(--red);}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← Back to overview</a>
  <div id="root"><div class="loading">Loading…</div></div>
</div>

<script>
const esc = s => (s==null?'':String(s)).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const qs = new URLSearchParams(location.search);
const iniId = qs.get('ini');
const accentClass = a => a==='amber'?'amber':a==='pink'?'pink':'';
const healthClass = h => ({'on track':'ontrack','at risk':'atrisk','off track':'offtrack','planning':'planning'}[(h||'').toLowerCase()]||'planning');

function list(items, cls, render){
  if(!items || !items.length) return '<div class="empty">None recorded.</div>';
  return '<ul class="clean '+(cls||'')+'">'+items.map(render).join('')+'</ul>';
}

function section(title, inner){ return '<section><div class="sec-h">'+title+'</div>'+inner+'</section>'; }

function render(layout, ctx){
  const meta = (layout.initiatives||[]).find(i=>i.id===iniId);
  const c = (ctx.initiatives||{})[iniId];
  if(!c){ document.getElementById('root').innerHTML = '<div class="err">No context found for this initiative.</div>'; return; }
  const accent = meta ? meta.accent : 'accent';

  // hero
  let html = '<div class="hero '+accentClass(accent)+'">'
    + '<h1>'+esc(c.title)+'</h1>'
    + '<div class="meta">'
    + '<span class="health '+healthClass(c.health)+'">'+esc(c.health||'—')+'</span>'
    + (c.owner?'<span>Owner: <b>'+esc(c.owner)+'</b></span>':'')
    + (c.target_date?'<span>Target: '+esc(c.target_date)+'</span>':'')
    + (meta&&meta.url?'<span><a href="'+esc(meta.url)+'" target="_blank">Open in Linear ↗</a></span>':'')
    + '</div></div>';

  // exec summary
  html += section('Executive summary', '<div class="exec">'+esc(c.exec_summary)+'</div>');

  // what changed
  html += section('What changed (last '+ (ctx.lookback_days||14) +' days)',
    list(c.whats_changed, 'changed', x=>'<li>'+esc(x)+'</li>'));

  // notes / manual context (from the running-context memory; only shown if present)
  if(c.notes && c.notes.length){
    html += section('Notes & context',
      list(c.notes, '', n=>{ const t = (typeof n==='string')?n:n.text; const s=(n&&n.source)?n.source:null;
        return '<li>'+esc(t)+(s?' <span class="tag">— '+esc(s)+'</span>':'')+'</li>'; }));
  }

  // risks
  html += section('Risks & blockers',
    (c.risks&&c.risks.length)
      ? c.risks.map(r=>'<div class="risk"><span class="sev '+esc((r.severity||'low'))+'">'+esc(r.severity||'low')+'</span><span>'+esc(r.text)+'</span></div>').join('')
      : '<div class="empty">None recorded.</div>');

  // projects
  html += section('Projects',
    (c.projects&&c.projects.length)
      ? c.projects.map(p=>'<div class="proj"><div class="ph"><span class="pn">'+esc(p.name)+'</span>'
          + '<span class="pstat '+((p.status||'').toLowerCase().replace(/\s/g,''))+'">'+esc(p.status||'')+'</span>'
          + (p.owner?'<span class="own">· '+esc(p.owner)+'</span>':'')+'</div>'
          + (p.summary?'<div class="psum">'+esc(p.summary)+'</div>':'')
          + (p.blockers&&p.blockers.length?'<div class="pblock">⚠ '+p.blockers.map(esc).join('; ')+'</div>':'')
          + '</div>').join('')
      : '<div class="empty">No projects filed yet.</div>');

  // decisions
  html += section('Decisions log',
    list(c.decisions, '', d=>'<li>'+esc(d.text)+(d.date||d.source?' <span class="tag">— '+[d.date,d.source].filter(Boolean).map(esc).join(', ')+'</span>':'')+'</li>'));

  // open questions
  html += section('Open questions',
    list(c.open_questions, 'q', q=>'<li>'+esc(q.text)+(q.owner?' <span class="own">('+esc(q.owner)+')</span>':'')+'</li>'));

  // next steps
  html += section('Next steps',
    list(c.next_steps, '', s=>'<li>'+esc(s.text)+(s.owner||s.due?' <span class="own">— '+[s.owner,s.due].filter(Boolean).map(esc).join(', ')+'</span>':'')+'</li>'));

  // meetings
  html += section('Recent meetings',
    (c.meetings&&c.meetings.length)
      ? c.meetings.map(m=>{
          const blk=(lbl,arr)=>(arr&&arr.length)?'<div class="mblock"><span class="lbl">'+lbl+'</span><ul>'+arr.map(x=>'<li>'+esc(x)+'</li>').join('')+'</ul></div>':'';
          return '<div class="meeting"><div class="mh">'+esc(m.title)+(m.url?' <a href="'+esc(m.url)+'" target="_blank">↗</a>':'')+'</div>'
            + '<div class="md">'+esc(m.date||'')+'</div>'
            + (m.summary?'<div class="msum">'+esc(m.summary)+'</div>':'')
            + blk('Decisions', m.decisions) + blk('Open questions', m.open_questions) + blk('Next steps', m.next_steps)
            + '</div>';
        }).join('')
      : '<div class="empty">No meetings in the window. '+(c.sources_note?esc(c.sources_note):'')+'</div>');

  // resources
  if(c.resources&&c.resources.length){
    html += section('Resources', '<div class="res">'+c.resources.filter(r=>r.url).map(r=>'<a href="'+esc(r.url)+'" target="_blank">'+esc(r.label)+' ↗</a>').join('')+'</div>'
      + (c.sources_note?'<div class="src-note">'+esc(c.sources_note)+'</div>':''));
  }

  if(ctx.generated_at){
    const d=new Date(ctx.generated_at);
    html += '<div class="stamp">Context refreshed '+d.toLocaleString(undefined,{dateStyle:'medium',timeStyle:'short'})+' · sources: Linear, Granola, Slack</div>';
  }

  document.getElementById('root').innerHTML = html;
  document.title = 'Neno · ' + (c.title||'Context');
}

if(!iniId){
  document.getElementById('root').innerHTML = '<div class="err">No initiative specified. Return to the <a href="index.html">overview</a>.</div>';
}else{
  Promise.all([fetch('layout.json').then(r=>r.json()), fetch('context.json').then(r=>r.json())])
    .then(([layout,ctx])=>render(layout,ctx))
    .catch(e=>{document.getElementById('root').innerHTML='<div class="err">Could not load context: '+esc(e.message)+'</div>';});
}
</script>
</body>
</html>
